<!doctype html>
<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <form action="/api/login" method="post">
            <input
                type="text"
                placeholder="Username"
                name="username"
                required
            />
            <br />
            <input
                type="password"
                placeholder="Password"
                name="password"
                required
            />
            <br />
            <button type="submit">Login</button>
            <br />
            {{ error }}
        </form>
    </body>
</html>
